<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- C-arc: 260° opening right, counter-clockwise from upper-right to lower-right -->
  <path d="M 23.7 6.8 A 12 12 0 1 0 23.7 25.2"
        stroke="#1a1159" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Arc endpoint dots -->
  <circle cx="23.7" cy="6.8" r="2.2" fill="#1a1159"/>
  <circle cx="23.7" cy="25.2" r="2.2" fill="#1a1159"/>
  <!-- Purple orb -->
  <circle cx="16" cy="16" r="4.5" fill="#8B5CF6"/>
  <!-- Orb highlight -->
  <circle cx="14.5" cy="14.5" r="1.5" fill="rgba(255,255,255,0.35)"/>
</svg>
